name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  backend:
    name: Backend · Lint · Type · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: ruff
        run: |
          ruff check --output-format=github .
          ruff format --check .
      - name: mypy
        run: mypy sdk/wapsell services tests
      - name: pytest
        run: pytest -m "not integration" --cov --cov-report=term-missing

  dashboard-admin:
    name: Dashboard admin · Typecheck · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/admin/package-lock.json
      - name: install
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build
