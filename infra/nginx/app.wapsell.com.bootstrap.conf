# Bootstrap-only vhost: served on :80 while we obtain the TLS certificate
# from Let's Encrypt for the first time. Only answers ACME HTTP-01 challenges;
# everything else is 404 so we never accidentally serve dashboard traffic over
# plain HTTP.
#
# Install on the VPS:
#   cp /opt/waseller/infra/nginx/app.wapsell.com.bootstrap.conf \
#      /etc/nginx/sites-available/app.wapsell.com
#   ln -sf /etc/nginx/sites-available/app.wapsell.com \
#          /etc/nginx/sites-enabled/app.wapsell.com
#   nginx -t && systemctl reload nginx
#
# Then run certbot --webroot (see docs/DEPLOY-SUBDOMAINS.md). Once the cert
# exists, overwrite this file with app.wapsell.com.conf and reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name app.wapsell.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 404;
    }
}
