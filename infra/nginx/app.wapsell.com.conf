# /etc/nginx/sites-available/app.wapsell.com
# Symlinked from /etc/nginx/sites-enabled/app.wapsell.com on the host.
#
# Reverse-proxies https://app.wapsell.com -> 127.0.0.1:3020 where the
# wapsell-dashboard Docker container listens. Coexists with the landing
# (wapsell.com -> :3010), the api (pipaas.com -> :8500), and all the other
# sites Coolify manages on the same nginx.
#
# Why a separate subdomain: same-site cookies with api.wapsell.com. Both are
# subdomains of wapsell.com, so the browser treats /auth cookies set by the
# API as same-site and sends them on every dashboard request without the
# SameSite=None + third-party-cookie dance we had to do for localhost dev.

# HTTP -> HTTPS. Certbot keeps writing ACME challenges under /var/www/certbot
# so renewals don't need an nginx config change.
server {
    listen 80;
    listen [::]:80;
    server_name app.wapsell.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS vhost.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.wapsell.com;

    ssl_certificate /etc/letsencrypt/live/app.wapsell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wapsell.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WAPSELL_APP_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Catalog CSV uploads happen client-side; the dashboard itself never
    # uploads more than a few hundred KB at most.
    client_max_body_size 5m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/rss+xml image/svg+xml;
    gzip_proxied any;

    # Next.js hashes content into /_next/static/* and serves them as immutable;
    # cache aggressively at the proxy layer so we save a hop on every page.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }
}
