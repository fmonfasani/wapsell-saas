# /etc/nginx/sites-available/api.wapsell.com
# Symlinked from /etc/nginx/sites-enabled/api.wapsell.com on the host.
#
# Reverse-proxies https://api.wapsell.com -> 127.0.0.1:8500 where the
# pipaas-api Docker container listens. The same container is also reachable
# via https://pipaas.com (legacy vhost) — both vhosts point at the same
# upstream, so we don't have to choose one until we deprecate pipaas.com.
#
# Why a separate subdomain: same-site cookies with app.wapsell.com. See
# app.wapsell.com.conf for the full rationale.

server {
    listen 80;
    listen [::]:80;
    server_name api.wapsell.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.wapsell.com;

    ssl_certificate /etc/letsencrypt/live/api.wapsell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wapsell.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WAPSELL_API_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSV catalog ingestion + webhook payloads from Meta can be a few hundred
    # KB; 5 MB is generous and consistent with the landing's policy.
    client_max_body_size 5m;

    # Meta's webhook needs the raw body for HMAC verification — we should NOT
    # let nginx buffer it across read timeouts and break the signature check.
    proxy_request_buffering on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/rss+xml;
    gzip_proxied any;

    location / {
        proxy_pass http://127.0.0.1:8500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # API endpoints include the analytics aggregation which iterates the
        # buyer memory; default 60s is fine but bumping a bit for safety.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
