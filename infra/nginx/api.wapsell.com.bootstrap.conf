# Bootstrap-only vhost for api.wapsell.com — same purpose as the .conf
# variant but only answers ACME HTTP-01 challenges so we can mint the first
# Let's Encrypt cert. See app.wapsell.com.bootstrap.conf for full notes.

server {
    listen 80;
    listen [::]:80;
    server_name api.wapsell.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 404;
    }
}
